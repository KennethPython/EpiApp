spring.application.name=epiapp
server.port=${PORT:8080}

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:epiapp;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# H2 console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console


# Serialize dates as ISO strings, not timestamps
spring.jackson.serialization.write-dates-as-timestamps=false

jwt.secret=epiapp-super-secret-key-must-be-at-least-32-chars-long
jwt.expiration-ms=86400000

# Flyway disabled locally (H2 managed by Hibernate ddl-auto)
spring.flyway.enabled=false
