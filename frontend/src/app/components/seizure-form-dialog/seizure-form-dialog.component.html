<h2 mat-dialog-title>Add Seizure</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="seizure-form">

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Date</mat-label>
      <input matInput [matDatepicker]="picker" formControlName="date">
      <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Time</mat-label>
      <input matInput type="time" formControlName="time">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Duration (minutes)</mat-label>
      <input matInput type="number" formControlName="durationMinutes" min="1">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Seizure Type</mat-label>
      <mat-select formControlName="type">
        @for (st of seizureTypes; track st.value) {
          <mat-option [value]="st.value">{{ st.label }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Notes</mat-label>
      <textarea matInput formControlName="notes" rows="3"></textarea>
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-raised-button color="warn" (click)="submit()" [disabled]="form.invalid">
    Add Seizure
  </button>
</mat-dialog-actions>

<style>
  .seizure-form { display: flex; flex-direction: column; gap: 4px; padding-top: 8px; }
  .full-width { width: 100%; }
</style>
