<div class="login-page">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>EpiApp</mat-card-title>
      <mat-card-subtitle>Epilepsy Tracker</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Username</mat-label>
        <input matInput [(ngModel)]="username" (keyup.enter)="login()">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput type="password" [(ngModel)]="password" (keyup.enter)="login()">
      </mat-form-field>

      @if (errorMessage) {
        <p class="error">{{ errorMessage }}</p>
      }
    </mat-card-content>

    <mat-card-actions class="actions">
      <button mat-raised-button color="primary" class="full-width" (click)="login()" [disabled]="!username || !password">
        Login
      </button>
      <button mat-stroked-button class="full-width" (click)="goToRegister()">
        Register
      </button>
    </mat-card-actions>
  </mat-card>
</div>
